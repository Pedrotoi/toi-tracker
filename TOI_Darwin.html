<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>TOI - Darwin Solano</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#050c18;--bg2:#0a1628;--bg3:#0f172a;--b:#1e293b;--b2:#334155;--teal:#0d9488;--sl:#475569;--mu:#64748b;--tx:#f1f5f9;--tx2:#cbd5e1;--gr:#10b981;--am:#f59e0b;--rd:#ef4444;--fn:'DM Sans',sans-serif}
body{background:var(--bg);color:var(--tx);font-family:var(--fn);min-height:100vh}
input:focus,textarea:focus,select:focus{outline:none;border-color:var(--teal)!important;box-shadow:0 0 0 2px rgba(13,148,136,.15)}
button{font-family:var(--fn);cursor:pointer}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes slideIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
#hdr{background:var(--bg2);border-bottom:1px solid var(--b);padding:14px 20px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:50}
.logo{background:var(--teal);width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;color:#fff;flex-shrink:0}
#sbar{background:var(--bg2);border-bottom:1px solid var(--b);padding:6px 20px;display:flex;align-items:center;gap:8px;font-size:11px;color:var(--mu)}
.sd{width:6px;height:6px;border-radius:50%;background:var(--mu);flex-shrink:0}
.sd.sy{background:var(--am);animation:pulse 1s infinite}
.sd.ok{background:var(--gr)}
.sd.er{background:var(--rd)}
#wrap{padding:16px;max-width:520px;margin:0 auto}
.daycard{background:var(--bg3);border:1px solid var(--b);border-radius:16px;padding:16px 18px;margin-bottom:14px;display:flex;align-items:center;gap:14px}
.av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;flex-shrink:0}
.counters{display:flex;gap:20px;flex:1}
.cnt{text-align:center}
.cnt-val{font-size:22px;font-weight:800;line-height:1}
.cnt-lbl{font-size:10px;color:var(--mu);margin-top:2px;text-transform:uppercase;letter-spacing:.05em}
.newbtn{background:var(--teal);border:none;border-radius:12px;color:#fff;font-size:13px;font-weight:700;padding:10px 18px;white-space:nowrap;transition:background .2s}
.newbtn:hover{background:#0b7a70}
.section-lbl{font-size:11px;color:var(--sl);margin-bottom:10px;text-transform:uppercase;letter-spacing:.08em;font-weight:600}
/* FORM MODAL */
#fmodal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);backdrop-filter:blur(4px);z-index:100;align-items:flex-end;justify-content:center;padding:0}
#fmodal.open{display:flex}
#fbox{background:var(--bg3);border-radius:20px 20px 0 0;width:100%;max-width:520px;max-height:92vh;overflow:hidden;display:flex;flex-direction:column;animation:slideIn .25s ease}
.fmhdr{padding:16px 20px 12px;border-bottom:1px solid var(--b);display:flex;align-items:center;justify-content:space-between}
.fmtitle{font-size:16px;font-weight:700}
.fmclose{background:var(--b);border:none;border-radius:8px;color:var(--mu);font-size:18px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;line-height:1}
.fmbody{overflow-y:auto;padding:12px 20px 8px;flex:1}
.fi{margin-bottom:14px}
.fi label{display:block;font-size:12px;font-weight:600;color:var(--tx2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.05em}
.fi input[type=text],.fi input[type=number],.fi select,.fi textarea{width:100%;background:var(--b);border:1px solid var(--b2);border-radius:10px;color:var(--tx);font-size:14px;font-family:var(--fn);padding:11px 14px}
.fi textarea{resize:vertical}
.fi select option{background:var(--bg3)}
.type-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.type-btn{background:var(--b);border:1px solid var(--b2);border-radius:10px;color:var(--mu);font-size:12px;font-weight:600;padding:10px 8px;text-align:center;transition:all .2s}
.type-btn.sel{background:rgba(13,148,136,.15);border-color:var(--teal);color:var(--teal)}
/* GPS */
.gps-box{background:rgba(16,185,129,.06);border:1px solid rgba(16,185,129,.2);border-radius:12px;padding:14px;margin-bottom:14px}
.gps-title{font-size:12px;font-weight:700;color:var(--gr);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px}
.gps-row{display:flex;gap:8px}
.gps-inp{flex:1;background:var(--b);border:1px solid var(--b2);border-radius:10px;color:var(--tx);font-size:12px;font-family:var(--fn);padding:10px 12px;min-width:0}
.gps-btn{background:var(--gr);border:none;border-radius:10px;color:#fff;font-size:12px;font-weight:700;padding:10px 14px;white-space:nowrap;transition:background .2s;flex-shrink:0}
.gps-btn:disabled{background:var(--sl)}
.gps-status{font-size:11px;color:var(--gr);margin-top:6px;display:none}
.gps-note{font-size:11px;color:var(--mu);margin-top:6px;line-height:1.4}
/* SAVE BTN */
.fmfoot{padding:12px 20px 20px;border-top:1px solid var(--b)}
.savebtn{width:100%;background:var(--teal);border:none;border-radius:14px;color:#fff;font-size:15px;font-weight:700;padding:15px;font-family:var(--fn);display:flex;align-items:center;justify-content:center;gap:8px}
.savebtn:disabled{background:var(--sl)}
.spin{display:none;width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}
/* VISIT LOG */
.visit-item{background:var(--bg3);border:1px solid var(--b);border-radius:14px;padding:14px 16px;margin-bottom:8px;animation:slideIn .3s ease}
.vi-top{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.vi-type{font-size:10px;font-weight:700;padding:3px 8px;border-radius:6px;text-transform:uppercase;letter-spacing:.05em}
.vi-type.visita{background:rgba(13,148,136,.15);color:var(--teal)}
.vi-type.prospecto{background:rgba(245,158,11,.15);color:var(--am)}
.vi-type.cierre{background:rgba(16,185,129,.2);color:var(--gr)}
.vi-type.seguimiento{background:rgba(99,102,241,.15);color:#818cf8}
.vi-time{font-size:11px;color:var(--mu);margin-left:auto}
.vi-name{font-size:14px;font-weight:700;margin-bottom:3px}
.vi-sub{font-size:12px;color:var(--mu)}
.vi-note{font-size:12px;color:var(--tx2);margin-top:6px;padding-top:6px;border-top:1px solid var(--b)}
.vi-gps{display:inline-flex;align-items:center;gap:4px;font-size:11px;color:var(--gr);text-decoration:none;margin-top:6px;background:rgba(16,185,129,.08);padding:3px 8px;border-radius:6px}
.empty-state{text-align:center;padding:40px 20px;color:var(--sl)}
.empty-ico{font-size:40px;margin-bottom:12px}
.empty-txt{font-size:14px;font-weight:600;margin-bottom:6px;color:var(--tx2)}
.empty-sub{font-size:12px}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);color:#fff;font-size:13px;font-weight:600;padding:10px 20px;border-radius:30px;display:none;z-index:200;box-shadow:0 4px 20px rgba(0,0,0,.4);white-space:nowrap}</style>
</head>
<body>
<div id="hdr"><div class="logo">T</div><div><div style="font-size:15px;font-weight:800">TOI Sales Tracker</div><div style="font-size:11px;color:var(--sl)">Darwin Solano</div></div></div>
<div id="sbar"><div class="sd" id="sd"></div><span id="st">Listo</span></div>
<div id="wrap">
  <div class="daycard">
    <div class="av" style="width:44px;height:44px;font-size:16px;background:#0d9488">DS</div>
    <div class="counters">
      <div class="cnt"><div class="cnt-val" id="cnt-visitas" style="color:var(--teal)">0</div><div class="cnt-lbl">Visitas</div></div>
      <div class="cnt"><div class="cnt-val" id="cnt-cierres" style="color:var(--gr)">0</div><div class="cnt-lbl">Cierres</div></div>
      <div class="cnt"><div class="cnt-val" id="cnt-total" style="color:var(--mu)">0</div><div class="cnt-lbl">Total hoy</div></div>
    </div>
    <button class="newbtn" onclick="openForm()">+ Registrar</button>
  </div>
  <div class="section-lbl" id="log-lbl">Actividad de hoy</div>
  <div id="log"></div>
</div>
<div id="fmodal">
  <div id="fbox">
    <div class="fmhdr">
      <div class="fmtitle">Registrar visita</div>
      <button class="fmclose" onclick="closeForm()">&#10005;</button>
    </div>
    <div class="fmbody">
      <div class="fi">
        <label>Tipo de visita</label>
        <div class="type-row">
          <button class="type-btn sel" data-type="visita" onclick="setType(this)">&#128338; Visita</button>
          <button class="type-btn" data-type="prospecto" onclick="setType(this)">&#128270; Prospecto</button>
          <button class="type-btn" data-type="cierre" onclick="setType(this)">&#10003; Cierre</button>
          <button class="type-btn" data-type="seguimiento" onclick="setType(this)">&#128197; Seguimiento</button>
          <button class="type-btn" data-type="propuesta" onclick="setType(this)">&#128196; Propuesta</button>
          <button class="type-btn" data-type="otro" onclick="setType(this)">&#8943; Otro</button>
        </div>
      </div>
      <div class="fi">
        <label>Nombre del comercio *</label>
        <input type="text" id="f-commerce" placeholder="Ej: Restaurante La Paloma">
      </div>
      <div class="fi">
        <label>Contacto / Persona</label>
        <input type="text" id="f-contact" placeholder="Nombre del dueno o encargado">
      </div>
      <div class="fi">
        <label>Resultado de la visita</label>
        <textarea id="f-result" rows="2" placeholder="Que paso? Hubo interes? Proximo paso?"></textarea>
      </div>
      <div class="gps-box">
        <div class="gps-title">&#128205; Ubicacion del comercio</div>
        <div class="gps-row">
          <input type="text" class="gps-inp" id="f-loc" placeholder="Link de Google Maps o usa el boton...">
          <button class="gps-btn" id="gpsbtn" onclick="doGPS()">Mi GPS</button>
        </div>
        <div class="gps-status" id="gps-status"></div>
        <div class="gps-note">Presiona Mi GPS para capturar tu ubicacion exacta como prueba de la visita.</div>
      </div>
    </div>
    <div class="fmfoot">
      <button class="savebtn" id="savebtn" onclick="submitVisit()">
        <div class="spin" id="savespin"></div>
        <span id="savelbl">Guardar visita</span>
      </button>
    </div>
  </div>
</div>
<div id="toast"></div>
<script>
var GAS="https://script.google.com/macros/s/AKfycbz56gIacCl0-5zARtlLRYRSqWwyH2etegkwYB0X2ng1MXSPvMsRPBh5G8pI-1E3xzMcVg/exec";
var VNAME="Darwin Solano";
var LSKEY="toi_visits_darwin_solano";
var VCOLOR="#0d9488";

var visits=[];
var currentType="visita";
var isSaving=false;

var MONTHS=["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];
function now(){return new Date().toISOString();}
function today(){return new Date().toISOString().split("T")[0];}
function ftime(s){if(!s)return"";try{return new Date(s).toLocaleTimeString("es-DO",{hour:"2-digit",minute:"2-digit"});}catch(e){return "";}}
function fdate(s){if(!s)return"";var p=s.split("T")[0].split("-");return parseInt(p[2])+" "+MONTHS[parseInt(p[1])-1];}

function syncSt(cls,msg){
  var d=document.getElementById("sd"),t=document.getElementById("st");
  if(d)d.className="sd "+cls;if(t)t.textContent=msg;
}
function toast(msg,bg){
  var el=document.getElementById("toast");
  if(!el)return;
  el.textContent=msg;el.style.background=bg||"#10b981";el.style.display="block";
  setTimeout(function(){el.style.display="none";},3000);
}
function lsLoad(){
  try{return JSON.parse(localStorage.getItem(LSKEY)||"[]");}catch(e){return [];}
}
function lsSave(){
  try{localStorage.setItem(LSKEY,JSON.stringify(visits));}catch(e){}
}

function todayVisits(){
  var t=today();
  return visits.filter(function(v){return v.ts && v.ts.split("T")[0]===t;});
}

function updateCounters(){
  var tv=todayVisits();
  var visitas=tv.filter(function(v){return v.type!=="cierre";}).length;
  var cierres=tv.filter(function(v){return v.type==="cierre";}).length;
  var cv=document.getElementById("cnt-visitas"),cc=document.getElementById("cnt-cierres"),ct=document.getElementById("cnt-total");
  if(cv)cv.textContent=visitas;
  if(cc)cc.textContent=cierres;
  if(ct)ct.textContent=tv.length;
}

function renderLog(){
  var el=document.getElementById("log");
  var lbl=document.getElementById("log-lbl");
  if(!el)return;
  var tv=todayVisits();
  if(lbl)lbl.textContent="Actividad de hoy ("+tv.length+" registros)";
  if(!tv.length){
    el.innerHTML='<div class="empty-state"><div class="empty-ico">&#128205;</div><div class="empty-txt">Sin visitas registradas hoy</div><div class="empty-sub">Presiona + Registrar cada vez que visites un comercio</div></div>';
    return;
  }
  var h="";
  var sorted=tv.slice().sort(function(a,b){return b.ts.localeCompare(a.ts);});
  for(var i=0;i<sorted.length;i++){
    var v=sorted[i];
    var typeLabel={visita:"Visita",prospecto:"Prospecto",cierre:"Cierre",seguimiento:"Seguimiento",propuesta:"Propuesta",otro:"Otro"}[v.type]||v.type;
    h+='<div class="visit-item">';
    h+='<div class="vi-top">';
    h+='<span class="vi-type '+v.type+'">'+typeLabel+"</span>";
    h+='<span class="vi-time">'+ftime(v.ts)+"</span>";
    h+="</div>";
    h+='<div class="vi-name">'+(v.commerce||"Comercio sin nombre")+"</div>";
    if(v.contact)h+='<div class="vi-sub">Contacto: '+v.contact+"</div>";
    if(v.result)h+='<div class="vi-note">'+v.result+"</div>";
    if(v.location)h+='<a class="vi-gps" href="'+v.location+'" target="_blank">&#128205; Ver ubicacion GPS</a>';
    h+="</div>";
  }
  el.innerHTML=h;
}

function openForm(){
  document.getElementById("fmodal").className="open";
  document.getElementById("f-commerce").value="";
  document.getElementById("f-contact").value="";
  document.getElementById("f-result").value="";
  document.getElementById("f-loc").value="";
  document.getElementById("gps-status").style.display="none";
  document.getElementById("gps-status").textContent="";
  var gpsbtn=document.getElementById("gpsbtn");
  if(gpsbtn){gpsbtn.disabled=false;gpsbtn.textContent="Mi GPS";gpsbtn.style.background="";}
  setTypeByName("visita");
  setTimeout(function(){
    var inp=document.getElementById("f-commerce");
    if(inp)inp.focus();
  },300);
}
function closeForm(){
  document.getElementById("fmodal").className="";
}

function setType(btn){
  document.querySelectorAll(".type-btn").forEach(function(b){b.className="type-btn";});
  btn.className="type-btn sel";
  currentType=btn.getAttribute("data-type");
}
function setTypeByName(name){
  currentType=name;
  document.querySelectorAll(".type-btn").forEach(function(b){
    b.className="type-btn"+(b.getAttribute("data-type")===name?" sel":"");
  });
}

function doGPS(){
  var btn=document.getElementById("gpsbtn");
  var status=document.getElementById("gps-status");
  if(!btn)return;
  btn.disabled=true;btn.textContent="...";
  if(status){status.style.display="block";status.textContent="Obteniendo ubicacion...";}
  if(!navigator.geolocation){
    toast("GPS no disponible en este navegador","#ef4444");
    btn.disabled=false;btn.textContent="Mi GPS";return;
  }
  navigator.geolocation.getCurrentPosition(
    function(pos){
      var lat=pos.coords.latitude.toFixed(6),lng=pos.coords.longitude.toFixed(6);
      var acc=Math.round(pos.coords.accuracy);
      var url="https://www.google.com/maps?q="+lat+","+lng;
      document.getElementById("f-loc").value=url;
      if(status){status.style.display="block";status.textContent="GPS capturado (precision: +-"+acc+" metros)";}
      btn.disabled=false;btn.textContent="Actualizar";btn.style.background="#059669";
      toast("Ubicacion registrada","#10b981");
    },
    function(err){
      btn.disabled=false;btn.textContent="Mi GPS";
      var msgs={1:"GPS denegado - activa el permiso",2:"Senal GPS no disponible",3:"Tiempo agotado"};
      if(status){status.style.display="block";status.textContent=msgs[err.code]||"Error GPS";}
      toast(msgs[err.code]||"Error GPS","#ef4444");
    },
    {enableHighAccuracy:true,timeout:15000,maximumAge:0}
  );
}

function submitVisit(){
  if(isSaving)return;
  var commerce=document.getElementById("f-commerce").value.trim();
  if(!commerce){
    toast("Escribe el nombre del comercio","#ef4444");
    document.getElementById("f-commerce").focus();
    return;
  }
  isSaving=true;
  var btn=document.getElementById("savebtn"),sp=document.getElementById("savespin"),lb=document.getElementById("savelbl");
  if(btn)btn.disabled=true;if(sp)sp.style.display="block";if(lb)lb.textContent="Guardando...";

  var visit={
    ts: now(),
    type: currentType,
    commerce: commerce,
    contact: document.getElementById("f-contact").value.trim(),
    result: document.getElementById("f-result").value.trim(),
    location: document.getElementById("f-loc").value.trim(),
    vendor: VNAME,
    date: today()
  };

  visits.unshift(visit);
  lsSave();
  updateCounters();
  renderLog();
  closeForm();

  syncSt("sy","Enviando...");
  fetch(GAS,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify(visit),
    mode:"no-cors"
  }).then(function(){
    syncSt("ok","Enviado correctamente");
    toast("Visita registrada","#10b981");
  }).catch(function(){
    syncSt("er","Guardado localmente - sin conexion");
    toast("Guardado sin conexion","#f59e0b");
  }).finally(function(){
    isSaving=false;
    if(btn)btn.disabled=false;
    if(sp)sp.style.display="none";
    if(lb)lb.textContent="Guardar visita";
  });
}

// Init
visits=lsLoad();
updateCounters();
renderLog();
syncSt("ok","Listo");
</script>
</body>
</html>
