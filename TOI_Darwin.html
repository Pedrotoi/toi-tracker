<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>TOI - Darwin Solano</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#050c18;--bg2:#0a1628;--bg3:#0f172a;--b:#1e293b;--b2:#334155;--teal:#0d9488;--sl:#475569;--mu:#64748b;--tx:#f1f5f9;--tx2:#cbd5e1;--gr:#10b981;--am:#f59e0b;--rd:#ef4444;--fn:'DM Sans',sans-serif}
body{background:var(--bg);color:var(--tx);font-family:var(--fn);min-height:100vh}
input:focus,textarea:focus,select:focus{outline:none;border-color:var(--teal)!important;box-shadow:0 0 0 2px rgba(13,148,136,.15)}
button{font-family:var(--fn);cursor:pointer}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes slideIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
#hdr{background:var(--bg2);border-bottom:1px solid var(--b);padding:14px 20px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:50}
.logo{background:var(--teal);width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;color:#fff;flex-shrink:0}
#sbar{background:var(--bg2);border-bottom:1px solid var(--b);padding:6px 20px;display:flex;align-items:center;gap:8px;font-size:11px;color:var(--mu)}
.sd{width:6px;height:6px;border-radius:50%;background:var(--mu);flex-shrink:0}
.sd.sy{background:var(--am);animation:pulse 1s infinite}
.sd.ok{background:var(--gr)}
.sd.er{background:var(--rd)}
#tabs{display:flex;background:var(--bg2);border-bottom:1px solid var(--b);padding:0 16px}
.tab{background:none;border:none;padding:11px 14px;font-size:13px;font-weight:500;color:var(--sl);border-bottom:2px solid transparent}
.tab.on{font-weight:700;color:var(--teal);border-bottom-color:var(--teal)}
#wrap{padding:16px;max-width:540px;margin:0 auto}
.daycard{background:var(--bg3);border:1px solid var(--b);border-radius:16px;padding:14px 16px;margin-bottom:14px;display:flex;align-items:center;gap:12px}
.av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;flex-shrink:0}
.counters{display:flex;gap:16px;flex:1}
.cnt{text-align:center}
.cnt-val{font-size:22px;font-weight:800;line-height:1}
.cnt-lbl{font-size:10px;color:var(--mu);margin-top:2px;text-transform:uppercase;letter-spacing:.05em}
.newbtn{background:var(--teal);border:none;border-radius:12px;color:#fff;font-size:13px;font-weight:700;padding:10px 16px;white-space:nowrap}
.sec-lbl{font-size:11px;color:var(--sl);margin-bottom:10px;text-transform:uppercase;letter-spacing:.08em;font-weight:600}
/* MODAL */
#fmodal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.87);backdrop-filter:blur(4px);z-index:100;align-items:flex-end;justify-content:center}
#fmodal.open{display:flex}
#fbox{background:var(--bg3);border-radius:20px 20px 0 0;width:100%;max-width:520px;max-height:93vh;overflow:hidden;display:flex;flex-direction:column;animation:slideIn .25s ease}
.fmhdr{padding:16px 20px 12px;border-bottom:1px solid var(--b);display:flex;align-items:center;justify-content:space-between}
.fmtitle{font-size:16px;font-weight:700}
.fmclose{background:var(--b);border:none;border-radius:8px;color:var(--mu);font-size:18px;width:32px;height:32px;display:flex;align-items:center;justify-content:center}
.fmbody{overflow-y:auto;padding:12px 20px 8px;flex:1}
.fi{margin-bottom:14px;position:relative}
.fi label{display:block;font-size:12px;font-weight:600;color:var(--tx2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.05em}
.fi input,.fi textarea,.fi select{width:100%;background:var(--b);border:1px solid var(--b2);border-radius:10px;color:var(--tx);font-size:14px;font-family:var(--fn);padding:11px 14px}
.fi textarea{resize:vertical}
/* AUTOCOMPLETE */
.ac-list{position:absolute;top:100%;left:0;right:0;background:var(--bg2);border:1px solid var(--teal);border-radius:10px;z-index:200;max-height:180px;overflow-y:auto;margin-top:2px;display:none}
.ac-item{padding:10px 14px;cursor:pointer;border-bottom:1px solid var(--b);font-size:13px}
.ac-item:last-child{border-bottom:none}
.ac-item:hover{background:rgba(13,148,136,.12)}
.ac-name{font-weight:700;color:var(--tx)}
.ac-sub{font-size:11px;color:var(--mu);margin-top:2px}
.ac-badge{font-size:10px;background:rgba(13,148,136,.15);color:var(--teal);padding:1px 6px;border-radius:4px;margin-left:6px;font-weight:600}
/* TYPE BUTTONS */
.type-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.type-btn{background:var(--b);border:1px solid var(--b2);border-radius:10px;color:var(--mu);font-size:12px;font-weight:600;padding:10px 6px;text-align:center;transition:all .2s}
.type-btn.sel{background:rgba(13,148,136,.15);border-color:var(--teal);color:var(--teal)}
/* GPS */
.gps-box{background:rgba(16,185,129,.06);border:1px solid rgba(16,185,129,.2);border-radius:12px;padding:14px;margin-bottom:14px}
.gps-title{font-size:12px;font-weight:700;color:var(--gr);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px}
.gps-row{display:flex;gap:8px}
.gps-inp{flex:1;background:var(--b);border:1px solid var(--b2);border-radius:10px;color:var(--tx);font-size:12px;font-family:var(--fn);padding:10px 12px;min-width:0}
.gps-btn{background:var(--gr);border:none;border-radius:10px;color:#fff;font-size:12px;font-weight:700;padding:10px 14px;white-space:nowrap;flex-shrink:0}
.gps-btn:disabled{background:var(--sl)}
.gps-status{font-size:11px;color:var(--gr);margin-top:6px;display:none}
.gps-note{font-size:11px;color:var(--mu);margin-top:6px;line-height:1.4}
/* SAVE */
.fmfoot{padding:12px 20px 20px;border-top:1px solid var(--b)}
.savebtn{width:100%;background:var(--teal);border:none;border-radius:14px;color:#fff;font-size:15px;font-weight:700;padding:15px;font-family:var(--fn);display:flex;align-items:center;justify-content:center;gap:8px}
.savebtn:disabled{background:var(--sl)}
.spin{display:none;width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}
/* VISIT LOG */
.visit-item{background:var(--bg3);border:1px solid var(--b);border-radius:14px;padding:14px 16px;margin-bottom:8px;animation:slideIn .3s ease}
.vi-top{display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.vi-type{font-size:10px;font-weight:700;padding:3px 8px;border-radius:6px;text-transform:uppercase;letter-spacing:.05em}
.vi-type.visita{background:rgba(13,148,136,.15);color:var(--teal)}
.vi-type.prospecto{background:rgba(245,158,11,.15);color:var(--am)}
.vi-type.cierre{background:rgba(16,185,129,.2);color:var(--gr)}
.vi-type.seguimiento{background:rgba(99,102,241,.15);color:#818cf8}
.vi-type.propuesta{background:rgba(59,130,246,.15);color:#60a5fa}
.vi-type.otro{background:rgba(71,85,105,.2);color:var(--sl)}
.vi-time{font-size:11px;color:var(--mu);margin-left:auto}
.vi-name{font-size:14px;font-weight:700;margin-bottom:3px}
.vi-sub{font-size:12px;color:var(--mu)}
.vi-note{font-size:12px;color:var(--tx2);margin-top:6px;padding-top:6px;border-top:1px solid var(--b)}
.vi-gps{display:inline-flex;align-items:center;gap:4px;font-size:11px;color:var(--gr);text-decoration:none;margin-top:6px;background:rgba(16,185,129,.08);padding:3px 8px;border-radius:6px}
/* COMERCIOS TAB */
.com-card{background:var(--bg3);border:1px solid var(--b);border-radius:14px;padding:14px 16px;margin-bottom:8px}
.com-name{font-size:14px;font-weight:700;margin-bottom:4px}
.com-meta{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:6px}
.com-tag{font-size:11px;color:var(--mu);display:flex;align-items:center;gap:4px}
.com-visits{font-size:11px;background:var(--b);padding:2px 8px;border-radius:6px;color:var(--tx2);font-weight:600}
.com-last{font-size:11px;color:var(--mu);margin-top:4px}
.empty-state{text-align:center;padding:40px 20px;color:var(--sl)}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);color:#fff;font-size:13px;font-weight:600;padding:10px 20px;border-radius:30px;display:none;z-index:300;box-shadow:0 4px 20px rgba(0,0,0,.4);white-space:nowrap}</style>
</head>
<body>
<div id="hdr"><div class="logo">T</div><div><div style="font-size:15px;font-weight:800">TOI Sales Tracker</div><div style="font-size:11px;color:var(--sl)">Darwin Solano</div></div></div>
<div id="sbar"><div class="sd" id="sd"></div><span id="st">Cargando...</span></div>
<div id="tabs"><button class="tab on" onclick="setTab('hoy',this)">Mis visitas</button><button class="tab" onclick="setTab('comercios',this)">Comercios</button></div>
<div id="wrap"></div>
<div id="fmodal">
  <div id="fbox">
    <div class="fmhdr">
      <div class="fmtitle">Registrar visita</div>
      <button class="fmclose" onclick="closeForm()">&#10005;</button>
    </div>
    <div class="fmbody">
      <div class="fi">
        <label>Tipo de visita</label>
        <div class="type-row">
          <button class="type-btn sel" data-type="visita" onclick="setType(this)">&#128338; Visita</button>
          <button class="type-btn" data-type="prospecto" onclick="setType(this)">&#128270; Prospecto</button>
          <button class="type-btn" data-type="cierre" onclick="setType(this)">&#10003; Cierre</button>
          <button class="type-btn" data-type="seguimiento" onclick="setType(this)">&#128197; Seguimiento</button>
          <button class="type-btn" data-type="propuesta" onclick="setType(this)">&#128196; Propuesta</button>
          <button class="type-btn" data-type="otro" onclick="setType(this)">&#8943; Otro</button>
        </div>
      </div>
      <div class="fi" id="fi-commerce">
        <label>Nombre del comercio *</label>
        <input type="text" id="f-commerce" placeholder="Escribe para buscar o crear..." autocomplete="off" oninput="onCommerceInput(this.value)" onfocus="onCommerceFocus()" onblur="hideAC()">
        <div class="ac-list" id="ac-list"></div>
      </div>
      <div class="fi">
        <label>Contacto / Persona</label>
        <input type="text" id="f-contact" placeholder="Nombre del dueno o encargado">
      </div>
      <div class="fi">
        <label>Telefono del contacto</label>
        <input type="tel" id="f-phone" placeholder="Ej: 809-555-0000">
      </div>
      <div class="fi">
        <label>Resultado de la visita</label>
        <textarea id="f-result" rows="2" placeholder="Que paso? Hubo interes? Proximo paso?"></textarea>
      </div>
      <div class="gps-box">
        <div class="gps-title">&#128205; Ubicacion del comercio</div>
        <div class="gps-row">
          <input type="text" class="gps-inp" id="f-loc" placeholder="Link de Google Maps o usa el boton...">
          <button class="gps-btn" id="gpsbtn" onclick="doGPS()">Mi GPS</button>
        </div>
        <div class="gps-status" id="gps-status"></div>
        <div class="gps-note">Presiona Mi GPS para capturar tu ubicacion exacta como prueba de la visita.</div>
      </div>
    </div>
    <div class="fmfoot">
      <button class="savebtn" id="savebtn" onclick="submitVisit()">
        <div class="spin" id="savespin"></div>
        <span id="savelbl">Guardar visita</span>
      </button>
    </div>
  </div>
</div>
<div id="toast"></div>
<script>
var GAS="https://script.google.com/macros/s/AKfycbxjLJxE6yyHtSQbGh1fa6EvrwAGipBDbu-6kxeiylQ_ohdjsif5JKY5TYP7plteS0x7IA/exec";
var CSV_URL="https://docs.google.com/spreadsheets/d/e/2PACX-1vQBmrVjL_vJpzgT1F6WNE0ToxrTNXEgrfbgVPZ_sv_LcGiso00JjBfrHz6L2jI9h6veF_GWvExBi7K7/pub?gid=250315356&single=true&output=csv";
var VNAME="Darwin Solano";
var LSKEY="toi_visits_darwin_solano";
var VCOLOR="#0d9488";

var visits=[];
var allVisits=[];
var currentType="visita";
var isSaving=false;
var currentTab="hoy";
var acHideTimer=null;

var MONTHS=["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];
function now(){return new Date().toISOString();}
function today(){return new Date().toISOString().split("T")[0];}
function ftime(s){if(!s)return"";try{return new Date(s).toLocaleTimeString("es-DO",{hour:"2-digit",minute:"2-digit"});}catch(e){return "";}}
function fdate(s){if(!s)return"";var d=(s.indexOf("T")>=0?s.split("T")[0]:s);var p=d.split("-");if(p.length<3)return s;return parseInt(p[2])+" "+MONTHS[parseInt(p[1])-1];}
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function syncSt(cls,msg){var d=document.getElementById("sd"),t=document.getElementById("st");if(d)d.className="sd "+cls;if(t)t.textContent=msg;}
function toast(msg,bg){var el=document.getElementById("toast");if(!el)return;el.textContent=msg;el.style.background=bg||"#10b981";el.style.display="block";setTimeout(function(){el.style.display="none";},3000);}

function lsLoad(){try{return JSON.parse(localStorage.getItem(LSKEY)||"[]");}catch(e){return [];}}
function lsSave(){try{localStorage.setItem(LSKEY,JSON.stringify(visits));}catch(e){}}

// Parse CSV
function parseCSV(text){
  var lines=text.split("\n"),results=[];
  for(var i=1;i<lines.length;i++){
    var line=lines[i].trim();if(!line)continue;
    var cols=[],cur="",inQ=false;
    for(var c=0;c<line.length;c++){
      var ch=line[c];
      if(ch==='"'){inQ=!inQ;}
      else if(ch===","&&!inQ){cols.push(cur);cur="";}
      else{cur+=ch;}
    }
    cols.push(cur);
    if(cols.length<4)continue;
    results.push({
      ts:      (cols[0]||"").trim(),
      date:    (cols[1]||today()).trim(),
      vendor:  (cols[2]||"").trim(),
      type:    (cols[3]||"").trim().toLowerCase(),
      commerce:(cols[4]||"").trim(),
      contact: (cols[5]||"").trim(),
      result:  (cols[6]||"").trim(),
      location:(cols[7]||"").trim(),
      phone:   (cols[8]||"").trim()
    });
  }
  return results;
}

// Load all visits from CSV (for commerces tab and autocomplete)
function loadFromCSV(){
  syncSt("sy","Sincronizando...");
  fetch(CSV_URL+"&cb="+Date.now())
    .then(function(r){return r.text();})
    .then(function(text){
      allVisits=parseCSV(text);
      // Merge local visits that might not be in sheets yet
      var localToday=visits.filter(function(v){return v.date===today();});
      localToday.forEach(function(lv){
        var found=allVisits.some(function(av){return av.ts===lv.ts&&av.vendor===lv.vendor;});
        if(!found)allVisits.unshift(lv);
      });
      syncSt("ok","Sincronizado");
      render();
    })
    .catch(function(){
      syncSt("er","Modo offline");
      render();
    });
}

// Build unique commerce directory from all visits
function buildCommerceDir(){
  var map={};
  allVisits.forEach(function(v){
    if(!v.commerce)return;
    var key=v.commerce.toLowerCase().trim();
    if(!map[key]){
      map[key]={
        name:v.commerce,
        contact:v.contact||"",
        phone:v.phone||"",
        location:v.location||"",
        visits:[],
        lastVendor:v.vendor,
        lastDate:v.date
      };
    }
    // Update with most recent info
    if(v.ts>=(map[key].lastTs||"")){
      map[key].lastTs=v.ts;
      map[key].lastDate=v.date;
      map[key].lastVendor=v.vendor;
      if(v.contact)map[key].contact=v.contact;
      if(v.phone)map[key].phone=v.phone;
      if(v.location)map[key].location=v.location;
    }
    map[key].visits.push(v);
  });
  var arr=[];
  for(var k in map)arr.push(map[k]);
  arr.sort(function(a,b){return(b.lastTs||"").localeCompare(a.lastTs||"");});
  return arr;
}

// AUTOCOMPLETE
function onCommerceInput(val){
  if(acHideTimer){clearTimeout(acHideTimer);acHideTimer=null;}
  var list=document.getElementById("ac-list");
  if(!list)return;
  if(!val||val.length<2){list.style.display="none";return;}
  var q=val.toLowerCase();
  var dir=buildCommerceDir();
  var matches=dir.filter(function(c){return c.name.toLowerCase().indexOf(q)>=0;}).slice(0,6);
  if(!matches.length){list.style.display="none";return;}
  var h="";
  matches.forEach(function(c){
    var cnt=c.visits.length;
    h+='<div class="ac-item" onmousedown="selectCommerce(\''+esc(c.name)+'\')">';
    h+='<div class="ac-name">'+esc(c.name)+'<span class="ac-badge">'+cnt+" visita"+(cnt>1?"s":"")+"</span></div>";
    var sub=[];
    if(c.contact)sub.push(c.contact);
    if(c.phone)sub.push(c.phone);
    if(sub.length)h+='<div class="ac-sub">'+esc(sub.join(" · "))+"</div>";
    h+="</div>";
  });
  list.innerHTML=h;
  list.style.display="block";
}
function onCommerceFocus(){
  var val=document.getElementById("f-commerce").value;
  if(val.length>=2)onCommerceInput(val);
}
function hideAC(){
  acHideTimer=setTimeout(function(){
    var list=document.getElementById("ac-list");
    if(list)list.style.display="none";
  },200);
}
function selectCommerce(name){
  document.getElementById("f-commerce").value=name;
  var list=document.getElementById("ac-list");
  if(list)list.style.display="none";
  // Pre-fill contact, phone, location from most recent record
  var dir=buildCommerceDir();
  var found=dir.find(function(c){return c.name.toLowerCase()===name.toLowerCase();});
  if(found){
    if(found.contact){var ci=document.getElementById("f-contact");if(ci)ci.value=found.contact;}
    if(found.phone){var pi=document.getElementById("f-phone");if(pi)pi.value=found.phone;}
    if(found.location){
      var li=document.getElementById("f-loc");if(li)li.value=found.location;
      var ps=document.getElementById("gps-status");
      if(ps){ps.style.display="block";ps.textContent="Ubicacion pre-cargada del registro anterior";}
    }
    toast("Comercio encontrado - info pre-cargada","#0d9488");
  }
}

function todayVisits(){
  return visits.filter(function(v){return v.date===today();});
}
function updateCounters(){
  var tv=todayVisits();
  var vis=tv.filter(function(v){return v.type!=="cierre";}).length;
  var cier=tv.filter(function(v){return v.type==="cierre";}).length;
  var cv=document.getElementById("cnt-visitas"),cc=document.getElementById("cnt-cierres"),ct=document.getElementById("cnt-total");
  if(cv)cv.textContent=vis;if(cc)cc.textContent=cier;if(ct)ct.textContent=tv.length;
}

function render(){
  updateCounters();
  var w=document.getElementById("wrap");if(!w)return;
  if(currentTab==="hoy")w.innerHTML=renderHoy();
  else w.innerHTML=renderComercios();
}

function renderHoy(){
  var ini=VNAME.split(" ").map(function(x){return x[0];}).join("").slice(0,2).toUpperCase();
  var tv=todayVisits().slice().sort(function(a,b){return b.ts.localeCompare(a.ts);});
  var h='<div class="daycard">';
  h+='<div class="av" style="width:44px;height:44px;font-size:16px;background:'+VCOLOR+'">'+ini+"</div>";
  h+='<div class="counters">';
  h+='<div class="cnt"><div class="cnt-val" id="cnt-visitas" style="color:var(--teal)">'+tv.filter(function(v){return v.type!=="cierre";}).length+'</div><div class="cnt-lbl">Visitas</div></div>';
  h+='<div class="cnt"><div class="cnt-val" id="cnt-cierres" style="color:var(--gr)">'+tv.filter(function(v){return v.type==="cierre";}).length+'</div><div class="cnt-lbl">Cierres</div></div>';
  h+='<div class="cnt"><div class="cnt-val" id="cnt-total" style="color:var(--mu)">'+tv.length+'</div><div class="cnt-lbl">Total hoy</div></div>';
  h+="</div>";
  h+='<button class="newbtn" onclick="openForm()">+ Registrar</button>';
  h+="</div>";
  h+='<div class="sec-lbl">Actividad de hoy ('+tv.length+" registros)</div>";
  if(!tv.length){
    h+='<div class="empty-state"><div style="font-size:36px;margin-bottom:10px">&#128205;</div>';
    h+='<div style="font-size:14px;font-weight:600;color:#cbd5e1">Sin visitas registradas hoy</div>';
    h+='<div style="font-size:12px;margin-top:6px">Presiona + Registrar cada vez que visites un comercio</div></div>';
    return h;
  }
  for(var i=0;i<tv.length;i++)h+=visitCard(tv[i]);
  return h;
}

function renderComercios(){
  var dir=buildCommerceDir();
  var h='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">';
  h+='<div class="sec-lbl" style="margin-bottom:0">Comercios registrados ('+dir.length+")</div></div>";
  if(!dir.length){
    h+='<div class="empty-state"><div style="font-size:36px;margin-bottom:10px">&#127978;</div>';
    h+='<div style="font-size:14px;font-weight:600;color:#cbd5e1">Sin comercios aun</div>';
    h+='<div style="font-size:12px;margin-top:6px">Los comercios aparecen aqui al registrar visitas</div></div>';
    return h;
  }
  // Search bar
  h+='<input type="text" id="com-search" placeholder="Buscar comercio..." oninput="filterComercios(this.value)" style="width:100%;background:var(--b);border:1px solid var(--b2);border-radius:10px;color:var(--tx);font-size:14px;font-family:var(--fn);padding:10px 14px;margin-bottom:12px">';
  h+='<div id="com-list">';
  for(var i=0;i<dir.length;i++)h+=comercioCard(dir[i]);
  h+="</div>";
  return h;
}

function filterComercios(q){
  var dir=buildCommerceDir();
  if(q)dir=dir.filter(function(c){return c.name.toLowerCase().indexOf(q.toLowerCase())>=0;});
  var el=document.getElementById("com-list");
  if(!el)return;
  var h="";
  for(var i=0;i<dir.length;i++)h+=comercioCard(dir[i]);
  el.innerHTML=h||'<div style="font-size:13px;color:#475569;padding:20px 0">Sin resultados</div>';
}

function comercioCard(c){
  var cnt=c.visits.length;
  var types={};
  c.visits.forEach(function(v){types[v.type]=(types[v.type]||0)+1;});
  var h='<div class="com-card">';
  h+='<div class="com-name">'+esc(c.name)+'<span class="com-visits">'+cnt+" visita"+(cnt>1?"s":"")+"</span></div>";
  h+='<div class="com-meta">';
  if(c.contact)h+='<div class="com-tag">&#128100; '+esc(c.contact)+"</div>";
  if(c.phone)h+='<div class="com-tag">&#128222; <a href="tel:'+esc(c.phone)+'" style="color:var(--teal);text-decoration:none">'+esc(c.phone)+"</a></div>";
  h+="</div>";
  // Type breakdown
  var typeNames={visita:"Visitas",prospecto:"Prospectos",cierre:"Cierres",seguimiento:"Seguimientos",propuesta:"Propuestas",otro:"Otros"};
  var pills="";
  for(var t in types)pills+='<span style="font-size:10px;background:var(--b);padding:2px 7px;border-radius:5px;color:var(--tx2);margin-right:4px">'+typeNames[t]+": "+types[t]+"</span>";
  if(pills)h+='<div style="margin-bottom:6px">'+pills+"</div>";
  if(c.location)h+='<a href="'+esc(c.location)+'" target="_blank" style="display:inline-flex;align-items:center;gap:4px;font-size:11px;color:var(--gr);text-decoration:none;background:rgba(16,185,129,.08);padding:3px 8px;border-radius:6px;margin-bottom:6px">&#128205; Ver ubicacion GPS</a>';
  h+='<div class="com-last">Ultimo registro: '+fdate(c.lastDate)+" · "+esc(c.lastVendor)+"</div>";
  h+="</div>";
  return h;
}

function visitCard(v){
  var tmap={visita:"Visita",prospecto:"Prospecto",cierre:"Cierre",seguimiento:"Seguimiento",propuesta:"Propuesta",otro:"Otro"};
  var h='<div class="visit-item">';
  h+='<div class="vi-top"><span class="vi-type '+(v.type||"visita")+'">'+(tmap[v.type]||v.type)+"</span>";
  h+='<span class="vi-time">'+ftime(v.ts)+"</span></div>";
  h+='<div class="vi-name">'+esc(v.commerce||"Sin nombre")+"</div>";
  var sub=[];
  if(v.contact)sub.push(v.contact);
  if(v.phone)sub.push(v.phone);
  if(sub.length)h+='<div class="vi-sub">'+esc(sub.join(" · "))+"</div>";
  if(v.result)h+='<div class="vi-note">'+esc(v.result)+"</div>";
  if(v.location)h+='<a class="vi-gps" href="'+esc(v.location)+'" target="_blank">&#128205; Ver GPS</a>';
  h+="</div>";
  return h;
}

function setTab(tab,el){
  currentTab=tab;
  document.querySelectorAll(".tab").forEach(function(t){t.className="tab";});
  el.className="tab on";
  render();
}

function openForm(){
  document.getElementById("fmodal").className="open";
  document.getElementById("f-commerce").value="";
  document.getElementById("f-contact").value="";
  document.getElementById("f-phone").value="";
  document.getElementById("f-result").value="";
  document.getElementById("f-loc").value="";
  var gs=document.getElementById("gps-status");if(gs){gs.style.display="none";gs.textContent="";}
  var ac=document.getElementById("ac-list");if(ac)ac.style.display="none";
  var gpsbtn=document.getElementById("gpsbtn");if(gpsbtn){gpsbtn.disabled=false;gpsbtn.textContent="Mi GPS";gpsbtn.style.background="";}
  setTypeByName("visita");
  setTimeout(function(){var i=document.getElementById("f-commerce");if(i)i.focus();},300);
}
function closeForm(){document.getElementById("fmodal").className="";}
function setType(btn){
  document.querySelectorAll(".type-btn").forEach(function(b){b.className="type-btn";});
  btn.className="type-btn sel";currentType=btn.getAttribute("data-type");
}
function setTypeByName(name){
  currentType=name;
  document.querySelectorAll(".type-btn").forEach(function(b){b.className="type-btn"+(b.getAttribute("data-type")===name?" sel":"");});
}

function doGPS(){
  var btn=document.getElementById("gpsbtn"),status=document.getElementById("gps-status");
  if(!btn)return;btn.disabled=true;btn.textContent="...";
  if(status){status.style.display="block";status.textContent="Obteniendo ubicacion...";}
  if(!navigator.geolocation){toast("GPS no disponible","#ef4444");btn.disabled=false;btn.textContent="Mi GPS";return;}
  navigator.geolocation.getCurrentPosition(
    function(pos){
      var lat=pos.coords.latitude.toFixed(6),lng=pos.coords.longitude.toFixed(6),acc=Math.round(pos.coords.accuracy);
      var url="https://www.google.com/maps?q="+lat+","+lng;
      document.getElementById("f-loc").value=url;
      if(status){status.style.display="block";status.textContent="GPS capturado (precision: +-"+acc+"m)";}
      btn.disabled=false;btn.textContent="Actualizar";btn.style.background="#059669";
      toast("Ubicacion registrada","#10b981");
    },
    function(err){
      btn.disabled=false;btn.textContent="Mi GPS";
      var msgs={1:"GPS denegado",2:"Senal no disponible",3:"Tiempo agotado"};
      if(status){status.style.display="block";status.textContent=msgs[err.code]||"Error GPS";}
      toast(msgs[err.code]||"Error GPS","#ef4444");
    },
    {enableHighAccuracy:true,timeout:15000,maximumAge:0}
  );
}

function submitVisit(){
  if(isSaving)return;
  var commerce=document.getElementById("f-commerce").value.trim();
  if(!commerce){toast("Escribe el nombre del comercio","#ef4444");document.getElementById("f-commerce").focus();return;}
  isSaving=true;
  var btn=document.getElementById("savebtn"),sp=document.getElementById("savespin"),lb=document.getElementById("savelbl");
  if(btn)btn.disabled=true;if(sp)sp.style.display="block";if(lb)lb.textContent="Guardando...";
  var visit={
    ts:today()+"T"+new Date().toTimeString().split(" ")[0],
    date:today(),type:currentType,commerce:commerce,
    contact:document.getElementById("f-contact").value.trim(),
    phone:document.getElementById("f-phone").value.trim(),
    result:document.getElementById("f-result").value.trim(),
    location:document.getElementById("f-loc").value.trim(),
    vendor:VNAME
  };
  visits.unshift(visit);
  allVisits.unshift(visit);
  lsSave();
  closeForm();
  render();
  syncSt("sy","Enviando...");
  fetch(GAS,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(visit),mode:"no-cors"})
    .then(function(){syncSt("ok","Enviado correctamente");toast("Visita registrada","#10b981");})
    .catch(function(){syncSt("er","Guardado sin conexion");toast("Guardado offline","#f59e0b");})
    .finally(function(){isSaving=false;if(btn)btn.disabled=false;if(sp)sp.style.display="none";if(lb)lb.textContent="Guardar visita";});
}

visits=lsLoad();
render();
loadFromCSV();
setInterval(loadFromCSV,90000);
</script>
</body>
</html>
