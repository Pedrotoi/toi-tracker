<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>TOI - Carolina</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#050c18;--bg2:#0a1628;--bg3:#0f172a;--b:#1e293b;--b2:#334155;--teal:#0d9488;--sl:#475569;--mu:#64748b;--tx:#f1f5f9;--tx2:#cbd5e1;--gr:#10b981;--am:#f59e0b;--rd:#ef4444;--fn:'DM Sans',sans-serif}
body{background:var(--bg);color:var(--tx);font-family:var(--fn);min-height:100vh}
input:focus,textarea:focus{outline:none;border-color:var(--teal)!important}
button{font-family:var(--fn);cursor:pointer}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
#hdr{background:var(--bg2);border-bottom:1px solid var(--b);padding:14px 20px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:50}
.logo{background:var(--teal);width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;color:#fff}
#sbar{background:var(--bg2);border-bottom:1px solid var(--b);padding:6px 20px;display:flex;align-items:center;gap:8px;font-size:11px;color:var(--mu)}
.sd{width:6px;height:6px;border-radius:50%;background:var(--mu)}
.sd.sy{background:var(--am);animation:pulse 1s infinite}
.sd.ok{background:var(--gr)}
.sd.er{background:var(--rd)}
#wrap{padding:16px;max-width:520px;margin:0 auto}
.scard{background:var(--bg3);border:1px solid var(--b);border-radius:16px;padding:20px;margin-bottom:16px;display:flex;align-items:center;gap:16px}
.av{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:#fff;flex-shrink:0;background:#7c3aed}
.rw{position:relative;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0}
.rl{position:absolute;font-weight:700;line-height:1;font-family:var(--fn)}
.fcard{background:var(--bg3);border:1px solid var(--b);border-radius:16px;overflow:hidden;margin-bottom:12px}
.fhdr{padding:12px 18px;border-bottom:1px solid var(--b);font-size:11px;font-weight:700;color:var(--mu);text-transform:uppercase;letter-spacing:.08em}
.fi{padding:14px 18px;border-bottom:1px solid var(--b)}
.fi:last-child{border-bottom:none}
.fi label{display:block;font-size:13px;color:var(--tx2);margin-bottom:8px;font-weight:500}
.fi .goal{font-size:11px;color:var(--sl);float:right;font-weight:400}
.ni{background:var(--b);border:1px solid var(--b2);border-radius:8px;color:var(--tx);font-size:16px;font-weight:700;font-family:var(--fn);padding:10px 14px;width:88px;display:block}
.pb{height:6px;background:var(--b);border-radius:3px;overflow:hidden;margin-top:8px}
.pbf{height:100%;border-radius:3px;transition:width .3s}
.cb{border-radius:8px;font-size:12px;font-weight:600;padding:8px 18px;border:1px solid;transition:all .2s;display:inline-block}
.cb.on{background:var(--teal);border-color:var(--teal);color:#fff}
.cb.off{background:var(--b);border-color:var(--b2);color:var(--mu)}
.ta{width:100%;background:var(--b);border:1px solid var(--b2);border-radius:8px;color:var(--tx);font-size:13px;font-family:var(--fn);padding:9px 12px;resize:vertical}
.lcard{background:rgba(16,185,129,.06);border:1px solid rgba(16,185,129,.2);border-radius:14px;padding:16px;margin-bottom:12px}
.ltitle{font-size:12px;font-weight:700;color:var(--gr);text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px}
.ci{width:100%;background:var(--b);border:1px solid var(--b2);border-radius:8px;color:var(--tx);font-size:13px;font-family:var(--fn);padding:9px 12px;display:block;margin-bottom:10px}
.lrow{display:flex;gap:8px;margin-bottom:6px}
.li{flex:1;background:var(--b);border:1px solid var(--b2);border-radius:8px;color:var(--tx);font-size:12px;font-family:var(--fn);padding:9px 12px;min-width:0}
.lb{background:var(--gr);border:none;border-radius:8px;color:#fff;font-size:12px;font-weight:700;padding:9px 14px;white-space:nowrap;font-family:var(--fn)}
.lb:disabled{background:var(--sl)}
.lprev{font-size:11px;color:var(--gr);margin-top:4px;display:none}
.lnote{font-size:11px;color:var(--mu);margin-top:8px;line-height:1.5}
.sbtn{width:100%;background:var(--teal);border:none;border-radius:14px;color:#fff;font-size:15px;font-weight:700;padding:16px;font-family:var(--fn);display:flex;align-items:center;justify-content:center;gap:8px;margin-top:4px}
.sbtn:disabled{background:var(--sl)}
.spinner{display:none;width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}
.banner{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);border-radius:12px;padding:14px 18px;margin-bottom:16px;display:flex;align-items:center;gap:12px}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);color:#fff;font-size:13px;font-weight:600;padding:10px 20px;border-radius:30px;display:none;z-index:200;box-shadow:0 4px 20px rgba(0,0,0,.4)}
</style>
</head>
<body>
<div id="hdr">
  <div class="logo">T</div>
  <div>
    <div style="font-size:15px;font-weight:800">TOI Sales Tracker</div>
    <div id="hdate" style="font-size:11px;color:var(--sl)"></div>
  </div>
</div>
<div id="sbar">
  <div class="sd" id="sd"></div>
  <span id="st">Iniciando...</span>
</div>
<div id="wrap"><p style="color:#475569;padding:20px 0">Cargando formulario...</p></div>
<div id="toast"></div>
<script>
var URL_GAS = 'https://script.google.com/macros/s/AKfycbwVQVDEbDWCuWZd5hHC0UMLCZN7AP-j4ImijDG_8Ry9Mu1RdR7T7Qq9wFPYygNywvCMOA/exec';
var VNAME = 'Carolina';
var LSKEY = 'toi_carolina';
var form = {};
var saved = false;
var saving = false;
var MONTHS = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];

function today() { return new Date().toISOString().split('T')[0]; }
function fdate(s) {
  if (!s) return '';
  var p = s.split('-');
  return parseInt(p[2]) + ' ' + MONTHS[parseInt(p[1])-1] + ' ' + p[0];
}
function ftime(s) {
  if (!s) return '';
  try { return new Date(s).toLocaleTimeString('es-DO',{hour:'2-digit',minute:'2-digit'}); } catch(e){ return ''; }
}
function clr(p) { return p>=80?'#10b981':p>=50?'#f59e0b':'#ef4444'; }
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/'/g,'&#39;').replace(/"/g,'&quot;');
}
function score() {
  var s=0, t=0;
  var goals = {prospecting:8, visits:3, proposals:1};
  var checks = ['crm','pipeline'];
  for (var k in goals) { t+=goals[k]; s+=Math.min(parseInt(form[k]||0),goals[k]); }
  for (var i=0;i<checks.length;i++) { t+=1; s+=form[checks[i]]?1:0; }
  return t>0?Math.round((s/t)*100):0;
}
function syncStatus(cls, msg) {
  var d = document.getElementById('sd');
  var t = document.getElementById('st');
  if(d) d.className = 'sd ' + cls;
  if(t) t.textContent = msg;
}
function toast(msg, bg) {
  var el = document.getElementById('toast');
  if(!el) return;
  el.textContent = msg;
  el.style.background = bg||'#10b981';
  el.style.display = 'block';
  setTimeout(function(){ el.style.display='none'; }, 3000);
}
function lsLoad() {
  try {
    var all = JSON.parse(localStorage.getItem(LSKEY)||'{}');
    return all[today()] || {};
  } catch(e) { return {}; }
}
function lsSave(d) {
  try {
    var all = JSON.parse(localStorage.getItem(LSKEY)||'{}');
    all[today()] = d;
    localStorage.setItem(LSKEY, JSON.stringify(all));
  } catch(e) {}
}
function ring(sc, size, stroke) {
  var r = (size - stroke*2)/2;
  var circ = 2*Math.PI*r;
  var dash = (sc/100)*circ;
  var c = clr(sc);
  return '<div class="rw" style="width:'+size+'px;height:'+size+'px">'
    +'<svg width="'+size+'" height="'+size+'" style="transform:rotate(-90deg)">'
    +'<circle cx="'+(size/2)+'" cy="'+(size/2)+'" r="'+r+'" fill="none" stroke="#1e293b" stroke-width="'+stroke+'"/>'
    +'<circle cx="'+(size/2)+'" cy="'+(size/2)+'" r="'+r+'" fill="none" stroke="'+c+'" stroke-width="'+stroke+'"'
    +' stroke-dasharray="'+dash+' '+circ+'" stroke-linecap="round"/>'
    +'</svg><div class="rl" style="font-size:'+(Math.floor(size*.22))+'px;color:'+c+'">'+sc+'%</div></div>';
}
function updateRing() {
  var sc = score();
  var c = clr(sc);
  var circ = 2*Math.PI*26;
  var dash = (sc/100)*circ;
  var el = document.getElementById('mring');
  var lb = document.getElementById('mscore');
  if(el) { el.setAttribute('stroke-dasharray', dash+' '+circ); el.setAttribute('stroke',c); }
  if(lb) { lb.textContent = sc+'%'; lb.style.color = c; }
}
function render() {
  var sc = score();
  var ini = VNAME.split(' ').map(function(w){return w[0];}).join('').slice(0,2).toUpperCase();
  var tme = form.savedAt ? ftime(form.savedAt) : '';
  var h = '';

  h += '<div class="scard">';
  h += '<div class="av">'+ini+'</div>';
  h += '<div style="flex:1">';
  h += '<div style="font-size:18px;font-weight:800">'+VNAME+'</div>';
  h += '<div style="font-size:12px;color:var(--mu)">'+fdate(today())+'</div>';
  if(saved && tme) h += '<div style="font-size:11px;color:var(--gr);margin-top:4px">Enviado a las '+tme+'</div>';
  h += '</div>';
  h += '<div class="rw" style="width:64px;height:64px">';
  h += '<svg width="64" height="64" style="transform:rotate(-90deg)">';
  h += '<circle cx="32" cy="32" r="26" fill="none" stroke="#1e293b" stroke-width="5"/>';
  h += '<circle id="mring" cx="32" cy="32" r="26" fill="none" stroke="#0d9488" stroke-width="5" stroke-dasharray="0 163.4" stroke-linecap="round" style="transition:stroke-dasharray .5s"/>';
  h += '</svg><div class="rl" id="mscore" style="font-size:13px;color:#0d9488">0%</div>';
  h += '</div></div>';

  if(saved) {
    h += '<div class="banner"><div style="font-size:24px">&#10003;</div>';
    h += '<div><div style="font-size:14px;font-weight:700;color:var(--gr)">Reporte enviado hoy</div>';
    h += '<div style="font-size:12px;color:var(--mu)">Puedes editar y reenviar cuando quieras</div></div></div>';
  }

  h += '<div class="fcard"><div class="fhdr">Actividad del dia</div>';

  var fields = [
    {id:'prospecting', lbl:'Prospectos contactados hoy', type:'num', goal:8},
    {id:'visits',      lbl:'Visitas / demos realizadas',  type:'num', goal:3},
    {id:'proposals',   lbl:'Propuestas enviadas',          type:'num', goal:1},
    {id:'closings',    lbl:'Cierres del dia',              type:'num', goal:0},
    {id:'contracts',   lbl:'Contratos anuales',            type:'num', goal:0},
    {id:'crm',         lbl:'CRM actualizado hoy',          type:'chk', goal:0},
    {id:'pipeline',    lbl:'Pipeline revisado y limpio',   type:'chk', goal:0},
    {id:'blocker',     lbl:'Algun bloqueo hoy?',           type:'txt', goal:0},
    {id:'best_prospect',lbl:'Mejor prospecto del dia',     type:'txt', goal:0},
    {id:'next_actions', lbl:'Proximas acciones manana',    type:'txt', goal:0}
  ];

  for(var i=0;i<fields.length;i++) {
    var f = fields[i];
    var val = form[f.id];
    h += '<div class="fi"><label>';
    if(f.goal > 0) h += '<span class="goal">Meta: '+f.goal+'</span>';
    h += f.lbl+'</label>';

    if(f.type === 'num') {
      var pct = f.goal>0 ? Math.min(100,((parseInt(val)||0)/f.goal)*100) : 0;
      h += '<input type="number" min="0" class="ni" id="f_'+f.id+'" value="'+(val||'')+'" placeholder="0" oninput="fnum(''+f.id+'',this.value)">';
      if(f.goal>0) h += '<div class="pb"><div class="pbf" id="pb_'+f.id+'" style="width:'+pct+'%;background:'+clr(pct)+'"></div></div>';
    } else if(f.type === 'chk') {
      var on = !!val;
      h += '<button class="cb '+(on?'on':'off')+'" id="cb_'+f.id+'" onclick="fchk(''+f.id+'')">'+( on ? '&#10003; Completado' : 'Marcar como hecho')+'</button>';
    } else {
      h += '<textarea class="ta" id="f_'+f.id+'" rows="2" placeholder="Escribe aqui..." oninput="ftxt(''+f.id+'',this.value)">'+esc(val||'')+'</textarea>';
    }
    h += '</div>';
  }
  h += '</div>';

  var locVal = form.location_url || '';
  var commVal = form.commerce_name || '';
  h += '<div class="lcard"><div class="ltitle">Verificacion de visita</div>';
  h += '<div style="font-size:11px;color:var(--mu);margin-bottom:6px">Nombre del comercio visitado</div>';
  h += '<input type="text" class="ci" id="f_commerce" value="'+esc(commVal)+'" placeholder="Ej: Restaurante La Paloma" oninput="ftxt('commerce_name',this.value)">';
  h += '<div style="font-size:11px;color:var(--mu);margin-bottom:8px">Pin de ubicacion GPS</div>';
  h += '<div class="lrow">';
  h += '<input type="text" class="li" id="f_loc" value="'+esc(locVal)+'" placeholder="Pega link de Google Maps o usa el boton..." oninput="ftxt('location_url',this.value)">';
  h += '<button class="lb" id="gpsbtn" onclick="gps()">Mi GPS</button>';
  h += '</div>';
  h += '<div class="lprev" id="lprev">'+(locVal?'Ubicacion registrada <a href="'+esc(locVal)+'" target="_blank" style="color:var(--gr)">Ver mapa</a>':'')+'</div>';
  if(locVal) { h = h.replace('<div class="lprev" id="lprev">', '<div class="lprev" id="lprev" style="display:block">'); }
  h += '<div class="lnote">Presiona Mi GPS para capturar tu ubicacion, o pega un link de Google Maps.</div>';
  h += '</div>';

  h += '<button class="sbtn" id="sbtn" onclick="doSave()">';
  h += '<div class="spinner" id="spin"></div>';
  h += '<span id="slbl">'+(saved?'Actualizar reporte':'Enviar reporte del dia')+'</span>';
  h += '</button><div style="height:32px"></div>';

  document.getElementById('wrap').innerHTML = h;
  setTimeout(updateRing, 30);
}

function fnum(id, val) {
  form[id] = val;
  var goals = {prospecting:8, visits:3, proposals:1};
  if(goals[id]) {
    var pct = Math.min(100, ((parseInt(val)||0)/goals[id])*100);
    var pb = document.getElementById('pb_'+id);
    if(pb) { pb.style.width=pct+'%'; pb.style.background=clr(pct); }
  }
  updateRing();
}
function fchk(id) {
  form[id] = !form[id];
  var btn = document.getElementById('cb_'+id);
  if(btn) { btn.className='cb '+(form[id]?'on':'off'); btn.textContent=form[id]?'Completado':'Marcar como hecho'; }
  updateRing();
}
function ftxt(id, val) { form[id] = val; }

function gps() {
  var btn = document.getElementById('gpsbtn');
  if(!btn) return;
  btn.disabled = true; btn.textContent = '...';
  if(!navigator.geolocation) {
    toast('GPS no disponible', '#ef4444');
    btn.disabled=false; btn.textContent='Mi GPS'; return;
  }
  navigator.geolocation.getCurrentPosition(
    function(pos) {
      var lat = pos.coords.latitude.toFixed(6);
      var lng = pos.coords.longitude.toFixed(6);
      var acc = Math.round(pos.coords.accuracy);
      var url = 'https://www.google.com/maps?q='+lat+','+lng;
      form.location_url = url;
      var inp = document.getElementById('f_loc');
      if(inp) inp.value = url;
      var prev = document.getElementById('lprev');
      if(prev) { prev.style.display='block'; prev.innerHTML='GPS capturado (+-'+acc+'m) <a href="'+url+'" target="_blank" style="color:var(--gr)">Ver mapa</a>'; }
      btn.disabled=false; btn.textContent='OK';
      toast('Ubicacion registrada', '#10b981');
    },
    function(err) {
      btn.disabled=false; btn.textContent='Mi GPS';
      var msgs={1:'GPS denegado',2:'Senal no disponible',3:'Tiempo agotado'};
      toast(msgs[err.code]||'Error GPS', '#ef4444');
    },
    {enableHighAccuracy:true, timeout:15000, maximumAge:0}
  );
}

function doSave() {
  if(saving) return;
  saving = true;
  var btn=document.getElementById('sbtn');
  var sp=document.getElementById('spin');
  var lb=document.getElementById('slbl');
  if(btn) btn.disabled=true;
  if(sp) sp.style.display='block';
  if(lb) lb.textContent='Enviando...';
  form.savedAt = new Date().toISOString();
  lsSave(form);
  syncStatus('sy','Enviando...');
  var payload = {};
  for(var k in form) payload[k] = form[k];
  payload.vendor = VNAME;
  payload.date = today();
  fetch(URL_GAS, {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify(payload),
    mode: 'no-cors'
  }).then(function() {
    saving=false; saved=true;
    syncStatus('ok','Enviado correctamente');
    toast('Reporte enviado', '#10b981');
    render();
  }).catch(function() {
    saving=false; saved=true;
    syncStatus('ok','Guardado localmente');
    toast('Guardado sin conexion', '#f59e0b');
    render();
  });
}

function loadSheets() {
  syncStatus('sy','Cargando...');
  var cb = 'cb'+Date.now();
  var script = document.createElement('script');
  window[cb] = function(data) {
    try {
      var td = today();
      if(data && data[VNAME] && data[VNAME][td]) {
        form = data[VNAME][td];
        lsSave(form);
        saved = true;
      }
      syncStatus('ok','Sincronizado');
    } catch(e) {
      syncStatus('er','Sin conexion');
    }
    render();
    delete window[cb];
    document.head.removeChild(script);
  };
  script.onerror = function() {
    syncStatus('er','Sin conexion - modo offline');
    render();
    delete window[cb];
    if(script.parentNode) document.head.removeChild(script);
  };
  script.src = URL_GAS + '?vendor='+encodeURIComponent(VNAME)+'&callback='+cb+'&t='+Date.now();
  document.head.appendChild(script);
}

document.getElementById('hdate').textContent = fdate(today());
form = lsLoad();
if(form.savedAt) saved = true;
render();
loadSheets();
</script>
</body>
</html>
